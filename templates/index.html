<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flora — Assistente de Plantas</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: Arial, sans-serif;
            background: #1a3a2a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

      #container {
             background: #f5efe6;
            border-radius: 12px;
            width: 90%;
            max-width: 760px;
            height: 85vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        #header {
            background: #2d6a4f;
            color: white;
            padding: 16px 20px;
            border-radius: 12px 12px 0 0;
            font-size: 18px;
            font-weight: bold;
        }

        #mensagens {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .mensagem {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 14px;
            line-height: 1.5;
        }

        .usuario {
            background: #2d6a4f;
            color: white;
            align-self: flex-end;
        }

        .flora {
            background: #e9f5ec;
            color: #1b1b1b;
            align-self: flex-start;
        }

        .flora p { margin-bottom: 8px; }
        .flora ul, .flora ol { padding-left: 20px; margin-bottom: 8px; }
        .flora li { margin-bottom: 4px; }
        .flora strong { font-weight: bold; }

        #input-area {
            display: flex;
            padding: 12px;
            border-top: 1px solid #e0e0e0;
            gap: 8px;
        }

        #input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
        }

        #botao {
            background: #2d6a4f;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }

        #botao:hover { background: #1b4332; }
    </style>
</head>
<body>
    <div id="container">
        <div id="header">🌿 Flora — Assistente de Plantas</div>
        <div id="mensagens">
            <div class="mensagem flora">Olá! Sou a Flora 🌱 Como posso ajudar com suas plantas hoje?</div>
        </div>
        <div id="input-area">
            <input id="input" type="text" placeholder="Pergunte sobre suas plantas..." />
            <button id="botao">Enviar</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        let historico = [];

        async function enviar() {
            const input = document.getElementById("input");
            const mensagens = document.getElementById("mensagens");
            const texto = input.value.trim();
            if (!texto) return;

            mensagens.innerHTML += `<div class="mensagem usuario">${texto}</div>`;
            input.value = "";
            mensagens.scrollTop = mensagens.scrollHeight;

            const resposta = await fetch("/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ mensagem: texto, historico: historico })
            });

            const dados = await resposta.json();

            historico = dados.historico;
            mensagens.innerHTML += `<div class="mensagem flora">${marked.parse(dados.resposta)}</div>`;
            mensagens.scrollTop = mensagens.scrollHeight;
        }

        document.getElementById("botao").addEventListener("click", enviar);

        document.getElementById("input").addEventListener("keypress", (e) => {
            if (e.key === "Enter") enviar();
        });
    </script>
</body>
</html>
